name: Frontend CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy on Raspberry Pi
        run: |
          set -e
          cd ~/dento-deploy/Dento-smart-web
          git pull
          cd ~/dento-deploy/Dento-smart-backend/deploy/raspi
          docker-compose up -d --build frontend
